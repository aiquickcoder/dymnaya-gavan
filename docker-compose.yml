services:
  postgres:
    image: postgres:16-alpine
    container_name: mixmaster-postgres
    environment:
      POSTGRES_USER: mixmaster
      POSTGRES_PASSWORD: mixmaster
      POSTGRES_DB: mixmaster
    ports:
      - "5432:5432"
    volumes:
      - mixmaster_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mixmaster"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: mixmaster-api
    environment:
      DATABASE_URL: postgres://mixmaster:mixmaster@postgres:5432/mixmaster?sslmode=disable
      PORT: "8080"
      # FCM (staff-app пуши) — опционально:
      FCM_CREDENTIALS_FILE: ""
      FCM_PROJECT_ID: ""
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mixmaster_pg:
